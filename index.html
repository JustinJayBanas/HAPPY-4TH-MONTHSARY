<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Monthsary - Celebrate Our Love</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>
  :root {
    --primary: #ff1493;
    --secondary: #ff69b4;
    --bg: #0a0a12;
  }

  body {
    margin: 0;
    background: var(--bg);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    color: white;
  }

  /* Interactive Guide */
  #guide {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding: 20px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    z-index: 100;
    width: 200px;
  }
  .guide-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; color: #ff1493; opacity: 0.9; font-weight: bold; }
  .guide-item { font-size: 0.85rem; margin-bottom: 10px; opacity: 0.4; transition: 0.4s; display: flex; align-items: center; gap: 10px; }
  .guide-item.active { opacity: 1; color: white; transform: translateX(-5px); }
  .guide-item span { font-size: 1.2rem; }

  .camera-container {
    position: relative;
    width: 400px;
    max-width: 90vw;
    border-radius: 35px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0, 242, 255, 0.15);
    transition: all 1.5s ease;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .camera-container.unlocked {
    box-shadow: 0 0 80px rgba(255, 105, 180, 0.25);
  }

  video, canvas {
    width: 100%;
    transform: scaleX(-1);
    display: block;
    border-radius: 35px;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
  }

  .messages {
    margin-top: 25px;
    width: 85%;
    max-width: 550px;
    text-align: center;
    z-index: 10;
  }

  .letter {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 25px;
    padding: 22px;
    font-size: 1rem;
    line-height: 1.6;
    min-height: 80px;
    max-height: 300px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    transition: all 0.5s ease;
    word-wrap: break-word;
    overflow-wrap: break-word;
    white-space: normal;
    overflow-y: auto;
  }

  /* 3D Flower Elements */
  .flower {
    position: absolute;
    font-size: 35px;
    pointer-events: none;
    z-index: 99;
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
    animation: bloomFly 3.5s cubic-bezier(0.1, 0, 0.2, 1) forwards;
  }

  .flower-stem {
    position: absolute;
    width: 3px;
    background: linear-gradient(180deg, rgba(34,177,76,0.8), rgba(34,177,76,0.2));
    pointer-events: none;
    z-index: 98;
    transform-origin: bottom center;
    border-radius: 2px;
  }

  .flower-bloom {
    position: absolute;
    pointer-events: none;
    z-index: 99;
    font-size: 28px;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.6));
    animation: growFlower 2.5s ease-out forwards;
  }

  @keyframes bloomFly {
    0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
    15% { opacity: 1; transform: translate(-50%, -50%) scale(1.3) rotate(15deg); }
    100% { transform: translate(var(--mx), var(--my)) scale(1.8) rotate(var(--rt)); opacity: 0; }
  }

  @keyframes growFlower {
    0% { transform: translateY(0px) scaleY(0.1) scaleX(0) rotateZ(0deg); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(var(--my)) scaleY(1) scaleX(1) rotateZ(var(--rt)); opacity: 0; }
  }

  @keyframes growStem {
    0% { height: 0; opacity: 0.6; }
    50% { opacity: 0.8; }
    100% { height: var(--stem-height); opacity: 0; }
  }

  .heart-grow {
    position: absolute;
    pointer-events: none;
    z-index: 99;
    font-size: 30px;
    filter: drop-shadow(0 0 10px rgba(255,105,180,0.8));
    animation: growHeart 2.8s ease-out forwards;
  }

  @keyframes growHeart {
    0% { transform: translate(-50%, -50%) scale(0) rotateZ(0deg); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translate(-50%, calc(-50% + var(--my))) scale(1.2) rotateZ(var(--rt)); opacity: 0; }
  }

  .heart-pop {
    position: absolute;
    font-size: 25px;
    animation: popUp 1.5s ease-out forwards;
    pointer-events: none;
  }

  @keyframes popUp {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: translateY(-100px) scale(2); opacity: 0; }
  }

  .floating-image {
    position: absolute;
    pointer-events: none;
    z-index: 97;
    border-radius: 15px;
    box-shadow: 0 0 25px rgba(255, 20, 147, 0.6);
    animation: floatImage 4s ease-out forwards;
    overflow: hidden;
  }

  @keyframes floatImage {
    0% { transform: translate(-50%, -50%) scale(0) rotateZ(0deg); opacity: 0; }
    15% { opacity: 1; }
    100% { transform: translate(calc(-50% + var(--mx)), calc(-50% + var(--my))) scale(1) rotateZ(var(--rt)); opacity: 0; }
  }
</style>
</head>

<body>

<div id="guide">
  <div class="guide-title">💕 Our Monthsary 💕</div>
  <div class="guide-item" id="g1"><span>✋</span> Show Your Palm</div>
  <div class="guide-item" id="g2"><span>🫰</span> Make a Heart</div>
  <div class="guide-item" id="g3"><span>✌️</span> Grow Flowers</div>
  <div class="guide-item" id="g4"><span>👍</span> Give Love</div>
  <div class="guide-item" id="g6"><span>👌</span> Show Affection</div>
</div>

<div class="camera-container" id="container">
  <video id="video" autoplay playsinline></video>
  <canvas id="overlay"></canvas>
</div>

<div class="messages">
  <div class="letter" id="letterText">Waiting for user...</div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
const letterText = document.getElementById('letterText');
const container = document.getElementById('container');

let stage = 0; // 0: Locked, 1: Palm detected, 2: Heart/Flowers active
const finalMsg = "Every moment with you feels like a blessing. In this month together, my heart has grown fonder of you. Thank you for being my person. Happy Monthsary, my love. 💕";
const unlockMsg = "Hello my love, unlock the message in your heart...";
const confirmMsg = "You've unlocked my heart. Welcome. 💓";
let lastImageTime = 0;

// Picture URLs - Add your image paths here
const pictures = [
  'image/1.1.jfif',
  'image/1.2.jfif',
  'image/1.3.jfif',
  'image/1.4.jfif',
  'image/1.5.jfif'
];

function spawnImage(x, y) {
  if (pictures.length === 0) return;
  
  const img = document.createElement('img');
  img.className = 'floating-image';
  img.src = pictures[Math.floor(Math.random() * pictures.length)];
  img.width = 100;
  img.height = 100;
  img.style.left = x + 'px';
  img.style.top = y + 'px';
  img.style.setProperty('--mx', (Math.random() - 0.5) * 500 + 'px');
  img.style.setProperty('--my', (Math.random() - 0.8) * 500 + 'px');
  img.style.setProperty('--rt', (Math.random() * 30 - 15) + 'deg');
  document.body.appendChild(img);
  
  setTimeout(() => img.remove(), 4000);
}

function updateGuide(activeId) {
  document.querySelectorAll('.guide-item').forEach(el => el.classList.remove('active'));
  document.getElementById(activeId).classList.add('active');
}

function spawnFlower(x, y) {
  const flowerEmojis = ['�', '🌻', '🌸', '🌺', '🌷', '💐'];
  const stemHeight = Math.random() * 80 + 40; // 40-120px stems
  
  // Create stem
  const stem = document.createElement('div');
  stem.className = 'flower-stem';
  stem.style.left = x + 'px';
  stem.style.top = (y + stemHeight) + 'px';
  stem.style.setProperty('--stem-height', stemHeight + 'px');
  stem.style.animation = `growStem 2.5s ease-out forwards`;
  document.body.appendChild(stem);
  
  // Create flower bloom at the top
  const bloom = document.createElement('div');
  bloom.className = 'flower-bloom';
  bloom.innerHTML = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
  bloom.style.left = x + 'px';
  bloom.style.top = y + 'px';
  bloom.style.setProperty('--my', (-stemHeight) + 'px');
  bloom.style.setProperty('--rt', (Math.random() * 20 - 10) + 'deg');
  document.body.appendChild(bloom);
  
  setTimeout(() => {
    stem.remove();
    bloom.remove();
  }, 3000);
}

function spawnSpark(x, y) {
  const s = document.createElement('div');
  s.className = 'flower';
  s.innerHTML = '✨';
  s.style.left = x + 'px';
  s.style.top = y + 'px';
  s.style.setProperty('--mx', (Math.random()-0.5)*400 + 'px');
  s.style.setProperty('--my', (Math.random()-0.5)*400 + 'px');
  s.style.setProperty('--rt', (Math.random()*360) + 'deg');
  s.style.fontSize = '20px';
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 2500);
}

function spawnHeart(x, y) {
  const heartVariants = ['❤️', '💕', '💖', '💗'];
  const heartHeight = Math.random() * 120 + 80; // 80-200px growth
  
  const heart = document.createElement('div');
  heart.className = 'heart-grow';
  heart.innerHTML = heartVariants[Math.floor(Math.random() * heartVariants.length)];
  heart.style.left = x + 'px';
  heart.style.top = y + 'px';
  heart.style.setProperty('--my', (-heartHeight) + 'px');
  heart.style.setProperty('--rt', (Math.random() * 30 - 15) + 'deg');
  document.body.appendChild(heart);
  
  setTimeout(() => heart.remove(), 2800);
}

function typeMessage() {
  letterText.textContent = "";
  let i = 0;
  const speed = 60; // Typing speed in ms
  const timer = setInterval(() => {
    letterText.textContent += finalMsg.charAt(i);
    i++;
    if (i >= finalMsg.length) clearInterval(timer);
  }, speed);
}

const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

hands.onResults(results => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const lm = results.multiHandLandmarks[0];
    const color = stage === 2 ? "#ff69b4" : "#00f2ff";
    
    // Draw Skeleton with Glow
    ctx.shadowBlur = 15;
    ctx.shadowColor = color;
    ctx.strokeStyle = color;
    ctx.lineWidth = 4;
    [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20]].forEach(([i,j])=>{
      ctx.beginPath(); ctx.moveTo(lm[i].x*canvas.width, lm[i].y*canvas.height);
      ctx.lineTo(lm[j].x*canvas.width, lm[j].y*canvas.height); ctx.stroke();
    });

    // Interaction Positioning
    const rect = canvas.getBoundingClientRect();
    const indexX = rect.left + (1 - lm[8].x) * rect.width;
    const indexY = rect.top + lm[8].y * rect.height;

    // Gesture Logic
    const isIndexUp = lm[8].y < lm[6].y;
    const isMiddleUp = lm[12].y < lm[10].y;
    const isRingUp = lm[16].y < lm[14].y;
    const isPinkyUp = lm[20].y < lm[18].y;

    // STAGE 0 -> 1: Palm Detection
    if (stage === 0 && isIndexUp && isMiddleUp && isRingUp && isPinkyUp) {
      stage = 1;
      letterText.innerText = unlockMsg;
      updateGuide('g2');
    }

    // STAGE 1 -> 2: Finger Heart Detection
    if (stage === 1) {
      const heartDist = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
      if (heartDist < 0.04 && !isMiddleUp) {
        stage = 2;
        container.classList.add('unlocked');
        letterText.innerText = confirmMsg;
        setTimeout(() => typeMessage(), 800);
        updateGuide('g3');
      }
    }

    // STAGE 2: Peace Sign (Flowers) - Sprouting Flowers
    if (stage === 2) {
      if (isIndexUp && isMiddleUp && !isRingUp && !isPinkyUp) {
        // Spawn multiple flowers for sprouting effect
        for (let i = 0; i < 3; i++) {
          if (Math.random() > 0.4) {
            const offsetX = indexX + (Math.random() - 0.5) * 50;
            const offsetY = indexY + (Math.random() - 0.5) * 50;
            spawnFlower(offsetX, offsetY);
          }
        }
        updateGuide('g3');
      }
      
      // Thumbs Up (Show Floating Images)
      const thumbUpCheck = lm[4].y < lm[2].y && !isIndexUp && !isMiddleUp && !isRingUp && !isPinkyUp;
      if (thumbUpCheck) {
        const now = Date.now();
        if (now - lastImageTime > 800) { // Spawn every 0.8+ seconds
          for (let i = 0; i < 2; i++) {
            spawnImage(indexX + (Math.random() - 0.5) * 40, indexY + (Math.random() - 0.5) * 40);
          }
          lastImageTime = now;
        }
        updateGuide('g4');
      }
      
      // OK Sign (Thumb and Index close, others up)
      const okDist = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
      if (okDist < 0.05 && isMiddleUp && isRingUp && isPinkyUp) {
        if (Math.random() > 0.75) spawnHeart(indexX, indexY);
        updateGuide('g6');
      }
      
      // Wave gesture (Hand moving side to side with index up)
      const handVelocity = results.multiHandWorldLandmarks ? Math.abs(results.multiHandWorldLandmarks[0][9].x - lm[9].x) : 0;
      if (isIndexUp && !isMiddleUp && !isRingUp && !isPinkyUp) {
        if (Math.random() > 0.9) spawnSpark(indexX, indexY);
      }
    }
  }
});

const camera = new Camera(video, {
  onFrame: async () => { await hands.send({image: video}); },
  width: 360, height: 480
});

// Properly initialize with error handling
Promise.resolve(hands.initialize()).then(() => {
  updateGuide('g1');
  camera.start().catch(err => {
    console.error("Camera access denied:", err);
    letterText.innerText = "Camera access denied. Please enable camera permissions.";
  });
}).catch(err => {
  console.error("Hands initialization failed:", err);
  letterText.innerText = "Failed to load hand detection. Please refresh.";
});
</script>
</body>
</html>
